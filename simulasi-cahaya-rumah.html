<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Pencahayaan Alami Rumah</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --sky-morning: #f4a261;
    --sky-noon: #74b3ce;
    --sky-evening: #e07a5f;
    --panel-bg: rgba(10,14,22,0.82);
    --accent: #f9c74f;
    --text: #e8e8e0;
    --muted: #888880;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080c14;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 20px;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(14px, 2vw, 18px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 28px;
    text-align: center;
  }

  .sim-wrapper {
    width: 100%;
    max-width: 900px;
    background: var(--panel-bg);
    border: 1px solid rgba(249,199,79,0.18);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  .controls {
    padding: 20px 28px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .time-label {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    white-space: nowrap;
    min-width: 80px;
  }

  .slider-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #f4a261, #ffe066, #74b3ce, #5ba4cf, #e07a5f);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--accent);
    box-shadow: 0 2px 12px rgba(249,199,79,0.5);
    cursor: pointer;
    transition: box-shadow 0.2s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 2px 20px rgba(249,199,79,0.9);
  }

  .time-marks {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  .info-panel {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .info-item {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
  }

  .info-item .val {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    font-weight: 700;
  }

  .info-item .lbl {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .auto-btn {
    background: rgba(249,199,79,0.12);
    border: 1px solid rgba(249,199,79,0.35);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .auto-btn:hover, .auto-btn.active {
    background: rgba(249,199,79,0.28);
    border-color: var(--accent);
    box-shadow: 0 0 16px rgba(249,199,79,0.3);
  }
</style>
</head>
<body>

<h1>☀ Simulasi Pencahayaan Alami Bangunan</h1>
<p class="subtitle">Distribusi Cahaya Matahari · Potongan Interior Rumah</p>

<div class="sim-wrapper">
  <canvas id="sim" width="900" height="520"></canvas>
  <div class="controls">
    <div class="time-label" id="timeDisplay">06:00</div>
    <div class="slider-wrap">
      <input type="range" id="timeSlider" min="0" max="100" value="0">
      <div class="time-marks">
        <span>Pagi</span><span>Siang</span><span>Sore</span>
      </div>
    </div>
    <div class="info-panel">
      <div class="info-item">
        <div class="val" id="luxVal">12%</div>
        <div class="lbl">Intensitas</div>
      </div>
      <div class="info-item">
        <div class="val" id="angleVal">15°</div>
        <div class="lbl">Sudut Cahaya</div>
      </div>
    </div>
    <button class="auto-btn" id="autoBtn">▶ AUTO</button>
  </div>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('timeSlider');
const timeDisplay = document.getElementById('timeDisplay');
const luxVal = document.getElementById('luxVal');
const angleVal = document.getElementById('angleVal');
const autoBtn = document.getElementById('autoBtn');

let autoPlay = false;
let autoT = 0;
let animId = null;

// t: 0=6am, 100=18pm
function getTimeStr(t) {
  const hour = 6 + t * 12 / 100;
  const h = Math.floor(hour);
  const m = Math.floor((hour - h) * 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Sky gradient from t
function getSkyColors(t) {
  if (t < 20) {
    // morning
    const p = t / 20;
    return {
      top: lerpColor('#1a0a2e','#2d5a8e', p),
      bot: lerpColor('#f4a261','#87ceeb', p)
    };
  } else if (t < 50) {
    const p = (t - 20) / 30;
    return {
      top: lerpColor('#2d5a8e','#1a6db5', p),
      bot: lerpColor('#87ceeb','#a8d8f0', p)
    };
  } else if (t < 75) {
    const p = (t - 50) / 25;
    return { top: lerpColor('#1a6db5','#1a5a8a',p), bot: lerpColor('#a8d8f0','#90c0e0',p) };
  } else {
    const p = (t - 75) / 25;
    return {
      top: lerpColor('#1a5a8a','#3d1a0a', p),
      bot: lerpColor('#90c0e0','#e07a5f', p)
    };
  }
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
  const ar=[ah>>16,(ah>>8)&0xff,ah&0xff], br=[bh>>16,(bh>>8)&0xff,bh&0xff];
  const r = ar.map((v,i)=>Math.round(lerp(v,br[i],t)));
  return `rgb(${r[0]},${r[1]},${r[2]})`;
}

function hexToRgb(hex) {
  const h = parseInt(hex.replace('#',''), 16);
  return [(h>>16)&255, (h>>8)&255, h&255];
}

function draw(t) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Sun position: arc from left to right
  const sunProgress = t / 100;
  const sunAngle = Math.PI * sunProgress; // 0=left, PI=right (top at 0.5)
  const sunCX = W * 0.08 + (W * 0.84) * sunProgress;
  const arcHeight = 170;
  const sunCY = 85 - Math.sin(sunAngle) * arcHeight;

  // Sky
  const sky = getSkyColors(t);
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.52);
  grad.addColorStop(0, sky.top);
  grad.addColorStop(1, sky.bot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars (early/late)
  if (t < 10 || t > 90) {
    const a = t < 10 ? (10 - t) / 10 : (t - 90) / 10;
    drawStars(a * 0.7);
  }

  // Sun
  drawSun(sunCX, sunCY, t);

  // Ground/soil strip
  const groundY = H * 0.52;
  const gg = ctx.createLinearGradient(0, groundY, 0, H);
  gg.addColorStop(0,'#5a7a3a');
  gg.addColorStop(0.08,'#4a6830');
  gg.addColorStop(0.15,'#8b6c3a');
  gg.addColorStop(1,'#6b4c22');
  ctx.fillStyle = gg;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Grass detail
  ctx.fillStyle = '#3d6020';
  for (let x = 0; x < W; x += 14) {
    ctx.fillRect(x, groundY - 4, 2, 7);
    ctx.fillRect(x+6, groundY - 6, 2, 9);
  }

  // House cross-section
  drawHouse(t, sunCX, sunCY, W, H);

  // Trees outside
  drawTree(W * 0.05, groundY, 40, t);
  drawTree(W * 0.92, groundY, 35, t);
}

function drawStars(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#fff';
  const stars = [[50,30],[120,20],[200,50],[350,15],[500,40],[620,25],[750,35],[830,20]];
  stars.forEach(([x,y]) => {
    ctx.beginPath();
    ctx.arc(x,y,1.2,0,Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

function drawSun(cx, cy, t) {
  const intensity = Math.sin(Math.PI * t / 100);
  const r = 24 + intensity * 8;

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 4);
  const alpha = 0.12 + intensity * 0.18;
  glow.addColorStop(0, `rgba(255,220,80,${alpha})`);
  glow.addColorStop(1, 'rgba(255,180,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 4, 0, Math.PI * 2);
  ctx.fill();

  // Sun disk
  const sd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  sd.addColorStop(0,'#fff9c0');
  sd.addColorStop(0.4,'#ffe566');
  sd.addColorStop(1,'#f4a00a');
  ctx.fillStyle = sd;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // Rays
  ctx.save();
  ctx.strokeStyle = 'rgba(255,220,60,0.55)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (r + 3), cy + Math.sin(a) * (r + 3));
    ctx.lineTo(cx + Math.cos(a) * (r + 12 + intensity * 6), cy + Math.sin(a) * (r + 12 + intensity * 6));
    ctx.stroke();
  }
  ctx.restore();
}

function drawTree(x, groundY, size, t) {
  // trunk
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(x - size*0.08, groundY - size*0.5, size*0.16, size*0.5);
  // foliage
  const shadeAmt = 0.7 + 0.3 * Math.sin(Math.PI * t / 100);
  ctx.fillStyle = `rgba(${Math.round(40+shadeAmt*20)},${Math.round(100+shadeAmt*30)},${Math.round(30+shadeAmt*15)},0.95)`;
  ctx.beginPath();
  ctx.moveTo(x, groundY - size * 1.5);
  ctx.lineTo(x - size * 0.6, groundY - size * 0.5);
  ctx.lineTo(x + size * 0.6, groundY - size * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, groundY - size * 2.1);
  ctx.lineTo(x - size*0.45, groundY - size*1.2);
  ctx.lineTo(x + size*0.45, groundY - size*1.2);
  ctx.closePath();
  ctx.fill();
}

function drawHouse(t, sunCX, sunCY, W, H) {
  const hx = W * 0.18;   // house left
  const hw = W * 0.64;   // house width
  const hy = H * 0.52;   // ground level
  const hh = H * 0.35;   // house height (wall)
  const floors = 1;

  // --- Roof ---
  const roofBase = hy - hh;
  const roofPeak = roofBase - hh * 0.42;
  const roofOverhang = 18;

  // Roof shadow underside
  ctx.fillStyle = '#1a1008';
  ctx.beginPath();
  ctx.moveTo(hx - roofOverhang, roofBase);
  ctx.lineTo(hx + hw/2, roofPeak - 4);
  ctx.lineTo(hx + hw + roofOverhang, roofBase);
  ctx.closePath();
  ctx.fill();

  // Roof surface (left)
  const sunLeft = sunCX < hx + hw / 2;
  const roofLeftBright = sunLeft ? 0.88 : 0.42;
  const roofRightBright = sunLeft ? 0.42 : 0.88;
  ctx.fillStyle = `rgba(${Math.round(lerp(50,140,roofLeftBright))},${Math.round(lerp(28,80,roofLeftBright))},${Math.round(lerp(20,55,roofLeftBright))},1)`;
  ctx.beginPath();
  ctx.moveTo(hx - roofOverhang, roofBase);
  ctx.lineTo(hx + hw/2, roofPeak);
  ctx.lineTo(hx, roofBase);
  ctx.closePath();
  ctx.fill();

  // Roof surface (right)
  ctx.fillStyle = `rgba(${Math.round(lerp(50,140,roofRightBright))},${Math.round(lerp(28,80,roofRightBright))},${Math.round(lerp(20,55,roofRightBright))},1)`;
  ctx.beginPath();
  ctx.moveTo(hx + hw + roofOverhang, roofBase);
  ctx.lineTo(hx + hw/2, roofPeak);
  ctx.lineTo(hx + hw, roofBase);
  ctx.closePath();
  ctx.fill();

  // Roof tile lines
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let i = 1; i < 6; i++) {
    const p = i / 6;
    // left slope
    const lx1 = lerp(hx - roofOverhang, hx + hw/2, p);
    const ly1 = lerp(roofBase, roofPeak, p);
    const lx2 = lerp(hx, hx + hw/2, p);
    const ly2 = lerp(roofBase, roofPeak, p);
    ctx.beginPath(); ctx.moveTo(lx1, ly1); ctx.lineTo(lx2, ly2); ctx.stroke();
    // right slope
    const rx1 = lerp(hx+hw+roofOverhang, hx+hw/2, p);
    const ry1 = lerp(roofBase, roofPeak, p);
    const rx2 = lerp(hx+hw, hx+hw/2, p);
    const ry2 = lerp(roofBase, roofPeak, p);
    ctx.beginPath(); ctx.moveTo(rx1, ry1); ctx.lineTo(rx2, ry2); ctx.stroke();
  }
  ctx.restore();

  // === Interior rooms ===
  // Split into 3 rooms: living room (left), hall (center), bedroom (right)
  const roomDivW = [0.38, 0.26, 0.36]; // fractions
  let rx = hx;
  const rooms = roomDivW.map((fw, i) => {
    const rw = hw * fw;
    const obj = { x: rx, y: roofBase, w: rw, h: hh, idx: i };
    rx += rw;
    return obj;
  });

  const sunIntensity = Math.max(0, Math.sin(Math.PI * t / 100));
  const hourFrac = t / 100; // 0=left, 1=right

  // Draw room interiors
  rooms.forEach((room, ri) => {
    drawRoom(room, ri, t, sunCX, sunCY, hx, hw, hh, roofBase, hy, sunIntensity, hourFrac);
  });

  // === Wall dividers ===
  ctx.fillStyle = '#3a3030';
  ctx.fillRect(rooms[0].x + rooms[0].w - 5, roofBase, 10, hh);
  ctx.fillRect(rooms[1].x + rooms[1].w - 5, roofBase, 10, hh);

  // === Outer walls (front face) ===
  ctx.strokeStyle = '#2a2020';
  ctx.lineWidth = 3;
  ctx.strokeRect(hx, roofBase, hw, hh);

  // === Floor lines ===
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.lineTo(hx + hw, hy);
  ctx.stroke();

  // === Outdoor shadow under house ===
  const shadowGrad = ctx.createLinearGradient(hx, hy, hx, hy + 18);
  shadowGrad.addColorStop(0,'rgba(0,0,0,0.35)');
  shadowGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = shadowGrad;
  ctx.fillRect(hx, hy, hw, 18);

  // === Room labels ===
  ctx.font = '11px Space Mono, monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.textAlign = 'center';
  const roomNames = ['Ruang Tamu', 'Koridor', 'Kamar Tidur'];
  rooms.forEach((room, ri) => {
    ctx.fillText(roomNames[ri], room.x + room.w/2, room.y + room.h - 10);
  });
  ctx.textAlign = 'left';
}

function drawRoom(room, ri, t, sunCX, sunCY, houseX, houseW, houseH, roofBase, groundY, sunIntensity, hourFrac) {
  const {x, y, w, h} = room;

  // Base wall color
  const wallBase = ['#d4c4a8','#cbbfaf','#c8c0b0'][ri];
  ctx.fillStyle = wallBase;
  ctx.fillRect(x, y, w, h);

  // Floor
  const floorH = h * 0.12;
  const fg = ctx.createLinearGradient(x, groundY - floorH, x, groundY);
  fg.addColorStop(0,'#8b6c3a');
  fg.addColorStop(1,'#7a5c2a');
  ctx.fillStyle = fg;
  ctx.fillRect(x, groundY - floorH, w, floorH);

  // Floor boards
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  for (let bx = x; bx < x + w; bx += 22) {
    ctx.beginPath(); ctx.moveTo(bx, groundY - floorH); ctx.lineTo(bx, groundY); ctx.stroke();
  }
  ctx.restore();

  // Ceiling
  ctx.fillStyle = '#e8e0d0';
  ctx.fillRect(x, y, w, h * 0.06);

  // Windows: rooms 0 and 2 have windows on outer walls
  const windows = [];
  if (ri === 0) {
    // Left room: window on left wall
    windows.push({ side: 'left', cx: x, cy: y + h * 0.4, ww: 0, wh: h * 0.22 });
  } else if (ri === 2) {
    // Right room: window on right wall
    windows.push({ side: 'right', cx: x + w, cy: y + h * 0.4, ww: 0, wh: h * 0.22 });
  }

  // Also roof windows (skylight simulation) for corridor
  if (ri === 1) {
    // Skylight in ceiling
    windows.push({ side: 'top', cx: x + w/2, cy: y, ww: w * 0.5, wh: 0 });
  }

  // Draw sunlight beams INTO room
  windows.forEach(win => {
    drawLightBeam(win, room, t, sunCX, sunCY, sunIntensity, hourFrac, ri);
  });

  // Room furniture silhouettes
  drawFurniture(x, y, w, h, groundY, ri);

  // Window frames
  windows.forEach(win => {
    drawWindowFrame(win, room, ri);
  });

  // Ambient room shadow (ceiling shadow)
  const ambShadow = ctx.createLinearGradient(x, y, x, y + h * 0.35);
  ambShadow.addColorStop(0,'rgba(0,0,0,0.22)');
  ambShadow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = ambShadow;
  ctx.fillRect(x, y, w, h * 0.35);
}

function drawLightBeam(win, room, t, sunCX, sunCY, sunIntensity, hourFrac, ri) {
  if (sunIntensity < 0.05) return;

  const {x, y, w, h} = room;
  const groundY = y + h;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  const alpha = sunIntensity * 0.28;

  if (win.side === 'left' && hourFrac < 0.55) {
    // Sun coming from left: beam enters left wall
    const wy1 = win.cy - win.wh / 2;
    const wy2 = win.cy + win.wh / 2;

    // Beam angle depends on sun height
    const beamSlope = lerp(1.5, -0.2, Math.sin(Math.PI * hourFrac / 0.55));
    const beamLen = w * lerp(0.6, 1.0, Math.min(1, (0.55 - hourFrac) / 0.55));
    const spread = lerp(0.5, 2.0, (0.55 - hourFrac) / 0.55);

    const bx2 = x + beamLen;
    const by1_end = wy1 + beamSlope * beamLen - spread * beamLen * 0.18;
    const by2_end = wy2 + beamSlope * beamLen + spread * beamLen * 0.18;

    const clampedBy1 = Math.max(y, Math.min(groundY, by1_end));
    const clampedBy2 = Math.max(y, Math.min(groundY, by2_end));

    const bg = ctx.createLinearGradient(x, 0, bx2, 0);
    bg.addColorStop(0, `rgba(255,210,100,${alpha})`);
    bg.addColorStop(1, `rgba(255,210,100,0)`);

    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.moveTo(x, wy1);
    ctx.lineTo(x, wy2);
    ctx.lineTo(Math.min(bx2, x+w), clampedBy2);
    ctx.lineTo(Math.min(bx2, x+w), clampedBy1);
    ctx.closePath();
    ctx.fill();

    // Floor light patch
    if (by2_end >= groundY - 2) {
      const floorAlpha = sunIntensity * 0.45;
      const fg2 = ctx.createRadialGradient(x + beamLen*0.4, groundY - 5, 0, x + beamLen*0.4, groundY - 5, beamLen * 0.55);
      fg2.addColorStop(0, `rgba(255,220,120,${floorAlpha})`);
      fg2.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = fg2;
      ctx.fillRect(x, groundY - h * 0.12, beamLen, h * 0.12);
    }

  } else if (win.side === 'right' && hourFrac > 0.45) {
    // Sun coming from right
    const wy1 = win.cy - win.wh / 2;
    const wy2 = win.cy + win.wh / 2;

    const p = (hourFrac - 0.45) / 0.55;
    const beamSlope = lerp(-0.2, 1.5, p);
    const beamLen = w * lerp(1.0, 0.6, p);

    const bx1 = (x + w) - beamLen;
    const spread = lerp(2.0, 0.5, 1 - p);
    const by1_end = wy1 + beamSlope * beamLen - spread * beamLen * 0.18;
    const by2_end = wy2 + beamSlope * beamLen + spread * beamLen * 0.18;
    const clampedBy1 = Math.max(y, Math.min(groundY, by1_end));
    const clampedBy2 = Math.max(y, Math.min(groundY, by2_end));

    const bg = ctx.createLinearGradient(x+w, 0, bx1, 0);
    bg.addColorStop(0, `rgba(255,190,80,${alpha})`);
    bg.addColorStop(1, `rgba(255,190,80,0)`);
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.moveTo(x+w, wy1);
    ctx.lineTo(x+w, wy2);
    ctx.lineTo(Math.max(bx1, x), clampedBy2);
    ctx.lineTo(Math.max(bx1, x), clampedBy1);
    ctx.closePath();
    ctx.fill();

    if (by2_end >= groundY - 2) {
      const floorAlpha = sunIntensity * 0.45;
      const fg2 = ctx.createRadialGradient((x+w) - beamLen*0.4, groundY - 5, 0, (x+w) - beamLen*0.4, groundY - 5, beamLen * 0.55);
      fg2.addColorStop(0, `rgba(255,210,100,${floorAlpha})`);
      fg2.addColorStop(1, 'rgba(255,190,60,0)');
      ctx.fillStyle = fg2;
      ctx.fillRect(x + w - beamLen, groundY - h * 0.12, beamLen, h * 0.12);
    }

  } else if (win.side === 'top') {
    // Skylight
    const skAlpha = sunIntensity * 0.22;
    const bw = win.ww;
    const sk = ctx.createLinearGradient(0, y, 0, y + h * 0.65);
    sk.addColorStop(0, `rgba(180,220,255,${skAlpha})`);
    sk.addColorStop(1, 'rgba(180,220,255,0)');
    ctx.fillStyle = sk;
    ctx.fillRect(x + w/2 - bw/2, y, bw, h * 0.65);

    // Floor glow
    const fgk = ctx.createRadialGradient(x+w/2, groundY-4, 0, x+w/2, groundY-4, bw*0.7);
    fgk.addColorStop(0, `rgba(200,230,255,${sunIntensity * 0.35})`);
    fgk.addColorStop(1, 'rgba(200,230,255,0)');
    ctx.fillStyle = fgk;
    ctx.fillRect(x + w/2 - bw/2, groundY - h*0.12, bw, h*0.12);
  }

  ctx.globalCompositeOperation = 'source-over';
  ctx.restore();
}

function drawWindowFrame(win, room, ri) {
  const {x, y, w, h} = room;
  ctx.save();

  if (win.side === 'left') {
    const wy = win.cy - win.wh / 2;
    const wh = win.wh;
    const ww = 14;
    // Glass
    ctx.fillStyle = 'rgba(160,220,255,0.35)';
    ctx.fillRect(x, wy, ww, wh);
    // Frame
    ctx.strokeStyle = '#5a4028';
    ctx.lineWidth = 3;
    ctx.strokeRect(x, wy, ww, wh);
    ctx.beginPath(); ctx.moveTo(x, wy + wh/2); ctx.lineTo(x + ww, wy + wh/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + ww/2, wy); ctx.lineTo(x + ww/2, wy + wh); ctx.stroke();
  } else if (win.side === 'right') {
    const wy = win.cy - win.wh / 2;
    const wh = win.wh;
    const ww = 14;
    ctx.fillStyle = 'rgba(160,220,255,0.35)';
    ctx.fillRect(x + w - ww, wy, ww, wh);
    ctx.strokeStyle = '#5a4028';
    ctx.lineWidth = 3;
    ctx.strokeRect(x + w - ww, wy, ww, wh);
    ctx.beginPath(); ctx.moveTo(x+w-ww, wy + wh/2); ctx.lineTo(x+w, wy + wh/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w-ww/2, wy); ctx.lineTo(x+w-ww/2, wy + wh); ctx.stroke();
  } else if (win.side === 'top') {
    const bw = win.ww;
    const bh = 10;
    ctx.fillStyle = 'rgba(160,220,255,0.4)';
    ctx.fillRect(x + w/2 - bw/2, y, bw, bh);
    ctx.strokeStyle = '#5a4028';
    ctx.lineWidth = 2.5;
    ctx.strokeRect(x + w/2 - bw/2, y, bw, bh);
    ctx.beginPath(); ctx.moveTo(x+w/2, y); ctx.lineTo(x+w/2, y+bh); ctx.stroke();
  }

  ctx.restore();
}

function drawFurniture(rx, ry, rw, rh, groundY, ri) {
  ctx.save();
  ctx.globalAlpha = 0.7;
  const fY = groundY - rh * 0.12; // top of floor

  if (ri === 0) {
    // Sofa
    ctx.fillStyle = '#7a5c8a';
    ctx.fillRect(rx + rw*0.12, fY - rh*0.16, rw*0.55, rh*0.12);
    ctx.fillRect(rx + rw*0.12, fY - rh*0.2, rw*0.08, rh*0.16);
    ctx.fillRect(rx + rw*0.59, fY - rh*0.2, rw*0.08, rh*0.16);
    // Table
    ctx.fillStyle = '#8b6c3a';
    ctx.fillRect(rx + rw*0.25, fY - rh*0.075, rw*0.3, rh*0.055);
    ctx.fillRect(rx + rw*0.27, fY - rh*0.075, rw*0.03, rh*0.075);
    ctx.fillRect(rx + rw*0.49, fY - rh*0.075, rw*0.03, rh*0.075);
    // Lamp
    ctx.fillStyle = '#c0a060';
    ctx.beginPath(); ctx.arc(rx + rw*0.75, fY - rh*0.22, rh*0.04, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b4a20';
    ctx.fillRect(rx + rw*0.745, fY - rh*0.22, rw*0.01, rh*0.22);
  } else if (ri === 1) {
    // Staircase hint
    for (let s = 0; s < 4; s++) {
      ctx.fillStyle = `rgba(${100+s*15},${80+s*10},${60+s*8},0.8)`;
      ctx.fillRect(rx + rw*0.1 + s*rw*0.12, fY - rh*(0.06 + s*0.05), rw*0.3, rh*(0.04 + s*0.04));
    }
    // Plant
    ctx.fillStyle = '#3a6020';
    ctx.beginPath(); ctx.arc(rx + rw*0.72, fY - rh*0.16, rh*0.09, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b4226'; ctx.fillRect(rx+rw*0.71, fY-rh*0.07, rw*0.05, rh*0.07);
  } else if (ri === 2) {
    // Bed
    ctx.fillStyle = '#8aa0c8';
    ctx.fillRect(rx + rw*0.12, fY - rh*0.2, rw*0.65, rh*0.14);
    ctx.fillStyle = '#e8e0f0';
    ctx.fillRect(rx + rw*0.12, fY - rh*0.2, rw*0.22, rh*0.14); // pillow
    ctx.fillStyle = '#5a6088';
    ctx.fillRect(rx + rw*0.12, fY - rh*0.21, rw*0.65, rh*0.025);
    // Desk
    ctx.fillStyle = '#9b7c4a';
    ctx.fillRect(rx + rw*0.1, fY - rh*0.12, rw*0.2, rh*0.08);
    ctx.fillRect(rx + rw*0.11, fY - rh*0.12, rw*0.025, rh*0.12);
    ctx.fillRect(rx + rw*0.265, fY - rh*0.12, rw*0.025, rh*0.12);
    // Monitor
    ctx.fillStyle = '#222'; ctx.fillRect(rx+rw*0.13, fY-rh*0.18, rw*0.1, rh*0.065);
    ctx.fillStyle = '#1a3a6a'; ctx.fillRect(rx+rw*0.133, fY-rh*0.175, rw*0.094, rh*0.055);
  }

  ctx.restore();
}

function updateInfo(t) {
  const hour = 6 + t * 12 / 100;
  timeDisplay.textContent = getTimeStr(t);
  const intens = Math.max(0, Math.round(Math.sin(Math.PI * t / 100) * 100));
  luxVal.textContent = intens + '%';
  const angle = Math.round(t * 1.5 + 15);
  angleVal.textContent = angle + '°';
}

function render() {
  const t = parseFloat(slider.value);
  draw(t);
  updateInfo(t);
}

slider.addEventListener('input', render);

let lastTime = 0;
function autoLoop(ts) {
  if (!autoPlay) return;
  const delta = ts - lastTime;
  lastTime = ts;
  autoT = (autoT + delta * 0.025) % 100;
  slider.value = autoT;
  render();
  animId = requestAnimationFrame(autoLoop);
}

autoBtn.addEventListener('click', () => {
  autoPlay = !autoPlay;
  autoBtn.textContent = autoPlay ? '⏸ PAUSE' : '▶ AUTO';
  autoBtn.classList.toggle('active', autoPlay);
  if (autoPlay) {
    autoT = parseFloat(slider.value);
    lastTime = performance.now();
    animId = requestAnimationFrame(autoLoop);
  } else {
    cancelAnimationFrame(animId);
  }
});

// Initial render
render();
</script>
</body>
</html>
